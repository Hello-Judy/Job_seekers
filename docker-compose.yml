# Simplified Airflow 2.9 stack for local development.
# Adapted from the official Airflow docker-compose reference:
# https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html
#
# Start:    docker compose up -d
# Stop:     docker compose down
# Logs:     docker compose logs -f airflow-scheduler
# UI:       http://localhost:8080   (user: airflow / pass: airflow)

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Install our project dependencies into the Airflow image at runtime.
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      snowflake-connector-python==3.12.3
      pandas==2.2.3
      pyarrow==17.0.0
      openpyxl==3.1.5
      requests==2.32.3
      python-dotenv==1.0.1
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./sql:/opt/airflow/sql
    - ./logs:/opt/airflow/logs
    - ./.env:/opt/airflow/.env:ro
    - bls-work:/tmp/bls_qcew              # ~1.5 GB per-year scratch space for QCEW
    - bls-work-oews:/tmp/bls_oews
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    user: "0:0"                         # run init as root so chown below works
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Make BLS scratch dirs writable by the airflow user (UID 50000).
        # Named volumes are root-owned on first creation; without this
        # fix, the QCEW/OEWS extractors hit PermissionError.
        mkdir -p /tmp/bls_qcew /tmp/bls_oews
        chown -R 50000:0 /tmp/bls_qcew /tmp/bls_oews
        # Hand off to the regular Airflow init.
        su airflow -c "airflow db migrate && \
          airflow users create \
            --username airflow --password airflow \
            --firstname Air --lastname Flow \
            --role Admin --email airflow@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  streamlit:
    image: python:3.11-slim
    working_dir: /app
    environment:
      USER_DB_PATH: /app/data/users.db
    env_file:
      - .env
    volumes:
      - ./analysis:/app/analysis
      - ./src:/app/src
      - streamlit-data:/app/data      # named volume → DB survives container restarts
      - ./.env:/app/.env:ro
    ports:
      - "8501:8501"
    command: >
      sh -c "pip install --quiet streamlit pandas plotly snowflake-connector-python python-dotenv pyarrow && streamlit run analysis/app.py --server.port=8501 --server.address=0.0.0.0"
    restart: always

volumes:
  postgres-db-volume:
  streamlit-data:
  bls-work:                                # shared between scheduler and webserver
  bls-work-oews:
